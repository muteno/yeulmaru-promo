<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>사업현황 메뉴 개편 시안 — 2메뉴·이모지 제거·호버 글래스 70%</title>
<style>
/* ===== index.html :root 2블록 토큰 사본(계승 재현) ===== */
:root{
  --accent:#4A4DE7; --accent-light:#E8E8FD; --accent-glow:rgba(74,77,231,0.15);
  --peach-text:#D88455; --bg:linear-gradient(135deg,#FDF6F3 0%,#F0EBF5 50%,#EBF0F8 100%);
  --glass:rgba(255,255,255,0.55); --glass-surface:rgba(255,255,255,.78); --glass-bd:var(--glass);
  --glass-shadow:0 8px 32px rgba(74,77,231,0.08),0 2px 8px rgba(0,0,0,0.04);
  --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.12);
  --text:#1A1A2E; --dim:#888; --muted:#bbb; --neutral-text:#6B6B7B;
  --radius:16px; --radius-lg:20px; --radius-xl:24px; --r-pop:16px;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:22px 20px 70px;-webkit-font-smoothing:antialiased}
.pg-h{max-width:1180px;margin:0 auto 6px;font-size:19px;font-weight:800}
.pg-sub{max-width:1180px;margin:0 auto 18px;font-size:12.5px;color:var(--neutral-text);line-height:1.65;font-weight:600}
.pg-sub b{color:var(--text)}
.wrap{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}
@media(max-width:900px){.wrap{grid-template-columns:1fr}}
/* ===== 데스크톱 브라우저 창 프레임(캘린더 전례 계승) ===== */
.win{background:#fff;border-radius:14px;box-shadow:0 20px 56px rgba(74,77,231,.16),0 6px 18px rgba(26,26,46,.07);overflow:hidden;border:1px solid rgba(0,0,0,.06)}
.win-bar{height:38px;background:#f4f3f8;display:flex;align-items:center;gap:7px;padding:0 14px;border-bottom:1px solid rgba(0,0,0,.05)}
.win-bar i{width:11px;height:11px;border-radius:50%;display:block}
.win-bar i:nth-child(1){background:#f0685f}.win-bar i:nth-child(2){background:#f6bd3b}.win-bar i:nth-child(3){background:#63c556}
.win-url{margin-left:12px;font-size:11px;color:#9a97a6;background:#fff;border-radius:6px;padding:3px 12px;flex:1;max-width:340px}
.stage{position:relative;height:430px;background:var(--bg);overflow:hidden}
/* ===== nav 재현(실물 근사) ===== */
.nav{height:56px;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:4px;position:relative;z-index:5}
.nav-logo{font-size:15px;font-weight:800;color:var(--accent);margin-right:16px;letter-spacing:-.3px}
.nav-btn{padding:8px 13px;border:0;background:none;font-family:inherit;font-size:13.5px;font-weight:700;color:#5a5a6e;cursor:pointer;border-radius:9px;transition:background .14s,color .14s;position:relative}
.nav-btn:hover,.nav-btn.on{color:var(--accent);background:rgba(74,77,231,.06)}
.nav-sp{flex:1}
.nav-ava{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#6366F1);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center}
.hint{position:absolute;left:50%;transform:translateX(-50%);top:150px;font-size:12px;color:var(--neutral-text);font-weight:600;background:rgba(255,255,255,.7);padding:6px 13px;border-radius:999px;border:1px solid var(--border)}
/* ===== 드롭다운(dd-pop 계승 — 값은 컨트롤로 주입) ===== */
.dd{position:absolute;min-width:196px;border-radius:14px;padding:6px;z-index:20;
  border:1px solid rgba(0,0,0,0.06);box-shadow:0 16px 48px rgba(74,77,231,0.18),0 4px 14px rgba(0,0,0,0.08);
  animation:drop .22s cubic-bezier(.26,1.2,.5,1)}
@keyframes drop{from{opacity:0;transform:translateY(-6px) scale(.97)}to{opacity:1;transform:none}}
.dd-lab{padding:8px 14px 6px;font-size:11px;color:var(--dim);font-weight:700}
.dd-item{display:flex;align-items:center;gap:10px;width:100%;padding:11px 14px;border:0;background:none;text-align:left;font-size:13px;font-weight:600;color:var(--text);border-radius:9px;cursor:pointer;font-family:inherit;transition:background .12s}
.dd-item:hover{background:rgba(74,77,231,0.07)}
.dd-item .emo{font-size:16px;width:18px;text-align:center;flex-shrink:0}
.dd-item.admin{background:rgba(74,77,231,0.06)}
.dd-item.admin:hover{background:rgba(74,77,231,0.12)}
.tagrow{display:flex;gap:8px;margin-top:12px;max-width:1180px;margin-left:auto;margin-right:auto}
.cmp{max-width:1180px;margin:14px auto 0;font-size:12px;color:var(--neutral-text);line-height:1.6;background:rgba(255,255,255,.5);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.cmp b{color:var(--text)}
/* ===== 컨트롤 패널 ===== */
.panel{background:rgba(255,255,255,.62);border:1px solid var(--border);border-radius:16px;padding:16px 16px 18px;backdrop-filter:blur(8px);position:sticky;top:16px}
.panel h3{margin:0 0 10px;font-size:13px;font-weight:800}
.presets{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.pre{border:1.5px solid var(--border);background:#fff;border-radius:11px;padding:9px 10px;cursor:pointer;text-align:left;font-family:inherit;transition:border-color .14s,box-shadow .14s}
.pre:hover{border-color:var(--accent)}
.pre.on{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,77,231,.14)}
.pre .nm{font-size:12px;font-weight:800}
.pre .ds{font-size:9.5px;color:var(--dim);margin-top:2px;line-height:1.3}
.ctl{margin:12px 0}
.ctl label{display:flex;justify-content:space-between;font-size:11.5px;font-weight:700;color:#444;margin-bottom:5px}
.ctl label .v{font-variant-numeric:tabular-nums;color:var(--accent)}
input[type=range]{width:100%;accent-color:var(--accent)}
.tog{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#444;margin:12px 0;cursor:pointer}
.tog input{width:16px;height:16px;accent-color:var(--accent)}
.out{background:#1A1A2E;color:#E8E8FD;border-radius:12px;padding:12px 13px;font-size:11px;line-height:1.7;white-space:pre-wrap;font-family:'SF Mono',ui-monospace,Menlo,monospace;font-variant-numeric:tabular-nums;margin-top:8px}
.out .upd{color:#F0C4B8}.out .inh{color:#8fd4a8}
.copy{width:100%;margin-top:8px;padding:10px;border:0;border-radius:10px;background:var(--accent);color:#fff;font-size:12.5px;font-weight:800;cursor:pointer;font-family:inherit}
.copy:active{transform:scale(.99)}
.note{max-width:1180px;margin:16px auto 0;font-size:10.5px;color:var(--neutral-text);line-height:1.7}
.note b{color:var(--text)}
</style></head>
<body>
<div class="pg-h">사업현황 메뉴 개편 시안</div>
<div class="pg-sub">① nav <b>「사업현황」</b> 호버 → 세부메뉴 <b>[판매 현황] · [연간 누적 실적]</b> 2개(기존 "사업현황"=연간 누적 실적으로 개명) · ② 메뉴 <b>이모지 전부 제거</b> · ③ 세부메뉴 <b>글래스모피즘 + 불투명도 70%</b>. 아래 프리셋·슬라이더로 조정하고 <b>[선택값 복사]</b> → 붙여주면 실물 배선.</div>

<div class="wrap">
  <div>
    <div class="win">
      <div class="win-bar"><i></i><i></i><i></i><span class="win-url">yeulmaru.github.io/yeulmaru-promo</span></div>
      <div class="stage" id="stage">
        <div class="nav">
          <span class="nav-logo">예울마루</span>
          <button class="nav-btn">콘텐츠 제작</button>
          <button class="nav-btn">일정 관리</button>
          <button class="nav-btn on" id="anchor">사업현황</button>
          <button class="nav-btn">예매 관리</button>
          <button class="nav-btn">PLAY ZONE</button>
          <span class="nav-sp"></span>
          <span class="nav-ava">노</span>
        </div>
        <div class="hint">↑ 「사업현황」 세부메뉴 미리보기</div>
        <div class="dd" id="dd"></div>
      </div>
    </div>
    <div class="cmp" id="cmp"></div>
  </div>

  <div class="panel">
    <h3>프리셋</h3>
    <div class="presets" id="presets"></div>
    <div class="ctl"><label>배경 불투명도 <span class="v" id="vOpacity"></span></label><input type="range" id="opacity" min="45" max="97" step="1"></div>
    <div class="ctl"><label>블러(backdrop) <span class="v" id="vBlur"></span></label><input type="range" id="blur" min="6" max="26" step="1"></div>
    <label class="tog"><input type="checkbox" id="emoji"> 이모지 표시(현행)</label>
    <div class="out" id="out"></div>
    <button class="copy" id="copy">📋 선택값 복사</button>
  </div>
</div>

<div class="note" id="foot"></div>

<script>
var S={ opacity:70, blur:20, emoji:false };
var CUR={ opacity:97, blur:20, emoji:true };   // 현행 실측: dd-pop background rgba(255,255,255,0.97), blur 20, 이모지 O
// 기존 토큰 앵커(계승 후보): --glass 55% · --glass-surface 78%
var PRESETS=[
  {id:'cur', nm:'현행', ds:'97% 거의 불투명·이모지 O·판매현황', st:{opacity:97,blur:20,emoji:true}},
  {id:'g70', nm:'글래스 70% ★', star:1, ds:'무이모지·2메뉴·반투명 유리', st:{opacity:70,blur:20,emoji:false}},
  {id:'gs',  nm:'--glass-surface 78%', ds:'기존 토큰 계승값', st:{opacity:78,blur:20,emoji:false}},
  {id:'g55', nm:'--glass 55%', ds:'더 투명(기존 토큰)', st:{opacity:55,blur:22,emoji:false}}
];
var MENU=[
  {lab:'사업 현황', items:[
    {emo:'📈', txt:'판매 현황'},
    {emo:'📅', txt:'연간 누적 실적'},
    {emo:'➕', txt:'일일입력', admin:true}
  ]}
];
function bg(){ return 'rgba(255,255,255,'+(S.opacity/100).toFixed(2)+')'; }
function renderDD(){
  var dd=document.getElementById('dd');
  dd.style.background=bg();
  dd.style.backdropFilter=dd.style.webkitBackdropFilter='blur('+S.blur+'px) saturate(150%)';
  var g=MENU[0];
  var h='<div class="dd-lab">'+g.lab+'</div>';
  g.items.forEach(function(it){
    h+='<button class="dd-item'+(it.admin?' admin':'')+'">'+(S.emoji?('<span class="emo">'+it.emo+'</span>'):'')+'<span style="flex:1">'+it.txt+'</span></button>';
  });
  dd.innerHTML=h;
  var a=document.getElementById('anchor'); var ar=a.getBoundingClientRect(), sr=document.getElementById('stage').getBoundingClientRect();
  dd.style.left=(ar.left-sr.left)+'px'; dd.style.top=(ar.bottom-sr.top+8)+'px';
}
function tag(){
  // 계승/갱신 판정: 55→--glass · 78→--glass-surface, 그 외(70 등)=갱신 후보
  var o=S.opacity;
  if(o===55)return {t:'계승', d:'--glass (rgba(255,255,255,0.55))'};
  if(o===78)return {t:'계승', d:'--glass-surface (rgba(255,255,255,.78))'};
  return {t:'갱신 후보', d:'신규 토큰 필요 (예: --glass-menu)'};
}
function renderOut(){
  var t=tag();
  var cls=t.t==='계승'?'inh':'upd';
  var s='';
  s+='배경   : '+bg()+'   현행 rgba(255,255,255,0.97)\n';
  s+='         → <span class="'+cls+'">'+t.t+'</span> · '+t.d+'\n';
  s+='블러   : blur('+S.blur+'px) saturate(150%)   현행 blur(20px)\n';
  s+='이모지 : '+(S.emoji?'표시(현행)':'<span class="upd">제거</span>')+'\n';
  s+='구조   : 사업현황 ▸ [판매 현황] · [연간 누적 실적]'+ (MENU[0].items.some(function(i){return i.admin;})?' · [일일입력·관리자]':'') +'\n';
  s+='         (기존 "사업현황" 화면 = "연간 누적 실적"으로 개명)';
  document.getElementById('out').innerHTML=s;
  document.getElementById('vOpacity').textContent=S.opacity+'%';
  document.getElementById('vBlur').textContent=S.blur+'px';
}
function renderCmp(){
  document.getElementById('cmp').innerHTML='<b>현행</b> 97% 불투명(유리 거의 안 보임)·이모지 O · nav 라벨 "판매 현황" &nbsp;→&nbsp; <b>시안 ★</b> 70% 반투명 유리(뒤 배경 은은히 비침)·이모지 제거 · nav "사업현황" ▸ 2메뉴.';
}
function syncPresetHL(){
  document.querySelectorAll('.pre').forEach(function(b){
    var p=PRESETS.find(function(x){return x.id===b.dataset.id;});
    var on=p&&p.st.opacity===S.opacity&&p.st.blur===S.blur&&p.st.emoji===S.emoji;
    b.classList.toggle('on',!!on);
  });
}
function apply(st){ S.opacity=st.opacity; S.blur=st.blur; S.emoji=st.emoji;
  document.getElementById('opacity').value=S.opacity; document.getElementById('blur').value=S.blur; document.getElementById('emoji').checked=S.emoji;
  redraw();
}
function redraw(){ renderDD(); renderOut(); syncPresetHL(); }
// 프리셋 버튼
var pc=document.getElementById('presets');
PRESETS.forEach(function(p){
  var b=document.createElement('button'); b.className='pre'; b.dataset.id=p.id;
  b.innerHTML='<div class="nm">'+p.nm+'</div><div class="ds">'+p.ds+'</div>';
  b.onclick=function(){apply(p.st);}; pc.appendChild(b);
});
document.getElementById('opacity').oninput=function(){S.opacity=+this.value;redraw();};
document.getElementById('blur').oninput=function(){S.blur=+this.value;redraw();};
document.getElementById('emoji').onchange=function(){S.emoji=this.checked;redraw();};
document.getElementById('copy').onclick=function(){
  var t=tag();
  var txt='[사업현황 메뉴 개편 — 선택값]\n'
    +'배경 불투명도: '+S.opacity+'%  ('+bg()+')  현행 0.97\n'
    +'  → '+t.t+' · '+t.d+'\n'
    +'블러: blur('+S.blur+'px) saturate(150%)  현행 20px\n'
    +'이모지: '+(S.emoji?'표시':'제거')+'\n'
    +'구조: nav "사업현황" ▸ [판매 현황] · [연간 누적 실적]'+(MENU[0].items.some(function(i){return i.admin;})?' · [일일입력(관리자)]':'')+'\n'
    +'개명: 기존 "사업현황" 화면 → "연간 누적 실적"';
  navigator.clipboard&&navigator.clipboard.writeText(txt);
  this.textContent='✓ 복사됨'; var self=this; setTimeout(function(){self.textContent='📋 선택값 복사';},1400);
};
document.getElementById('foot').innerHTML='<b>재현 한계 각주</b> · ① 실제 드롭다운은 <code>_ddOpen</code>이 <code>position:fixed</code>로 body에 붙이고 전면 오버레이(z99999)로 바깥클릭 닫기 — 여기선 stage 안 <code>absolute</code>로 근사(위치·애니·유리질감은 동일 값). ② backdrop-filter 유리 비침은 뒤 배경(nav·본문)이 있어야 체감 — stage 상단 nav/그라데이션으로 재현. ③ 70%는 <b>기존 토큰에 없는 값</b>이라 확정 시 <code>:root</code> 신규 토큰(예 <code>--glass-menu</code>) 편입 3점 세트 필요(§🚨). 55%/78% 선택 시 기존 <code>--glass</code>/<code>--glass-surface</code> 계승. ④ 이모지 제거·2메뉴 구조는 실물과 동일 텍스트로 재현(폰트·간격 토큰 계승).';
// init = 추천 프리셋(글래스 70% ★)
apply(PRESETS[1].st);
renderCmp();
</script>
</body></html>
