<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홍보 계획표 — 예울마루</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2a2a2a;
    --border-light: #333;
    --text: #e8e8e8;
    --text-dim: #888;
    --text-muted: #555;
    --accent: #0FFD02;
    --accent-dim: rgba(15,253,2,0.12);
    --kakao: #FAC100;
    --insta: #E1306C;
    --youtube: #C62828;
    --blog: #2E7D32;
    --navy: #4A6FA5;
    --danger: #C00000;
    --sat-bg: rgba(66,133,244,0.05);
    --sun-bg: rgba(234,67,53,0.05);
    --nonmonth-bg: rgba(255,255,255,0.015);
    --nonmonth-text: #3a3a3a;
    --today-glow: rgba(15,253,2,0.08);
    --week-highlight: rgba(15,253,2,0.04);
    --radius: 10px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ══════════ 로그인 ══════════ */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 28px;
  }
  .login-logo {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .login-title {
    font-size: 26px;
    font-weight: 300;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .pin-wrap {
    display: flex;
    gap: 12px;
  }
  .pin-input {
    width: 52px;
    height: 60px;
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    background: var(--surface);
    border: 2px solid var(--border-light);
    border-radius: 12px;
    color: var(--text);
    caret-color: var(--accent);
    outline: none;
    transition: border-color 0.15s;
  }
  .pin-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  .pin-input.error { border-color: var(--danger); }
  #login-error {
    color: #ff6b6b;
    font-size: 13px;
    height: 20px;
  }
  #login-loading {
    color: var(--accent);
    font-size: 13px;
    height: 20px;
  }

  /* ══════════ 앱 ══════════ */
  #app { display: none; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
  }
  .topbar-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-dim);
  }
  .topbar-title span { color: var(--accent); font-weight: 700; }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .topbar-right button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }

  /* 월 네비 */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px 0 12px;
  }
  .nav-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border-light);
    background: transparent;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .month-label {
    text-align: center;
    min-width: 220px;
  }
  .month-label .year {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
  }
  .month-label .month {
    font-size: 20px;
    font-weight: 700;
    margin-left: 4px;
  }
  .month-label .suffix {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-dim);
    margin-left: 2px;
  }

  /* 상태 바 */
  .status-bar {
    text-align: center;
    padding: 6px;
    font-size: 11px;
    color: var(--text-muted);
    min-height: 24px;
  }
  .status-bar.loading { color: var(--accent); }
  .status-bar.error { color: #ff6b6b; }

  /* 탭 */
  .tab-bar {
    display: flex;
    padding: 0 24px;
    gap: 2px;
  }
  .tab-btn {
    padding: 9px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 8px 8px 0 0;
    font-family: inherit;
    transition: all 0.15s;
  }
  .tab-btn.active {
    background: var(--bg);
    color: var(--accent);
    border-color: var(--border-light);
  }

  /* ══════════ 캘린더 ══════════ */
  .calendar-wrap { padding: 0 24px 40px; overflow-x: auto; }

  .cal-grid {
    display: grid;
    grid-template-columns: 96px repeat(6, 1fr);
    min-width: 880px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .day-header {
    padding: 8px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    color: var(--text-muted);
  }
  .day-header:first-child { text-align: left; padding-left: 14px; }
  .day-header.sat { color: #5B9BD5; }
  .day-header.sun { color: #E06666; }

  /* 날짜 헤더 */
  .date-cell {
    padding: 5px 8px;
    font-size: 11px;
    font-weight: 600;
    background: var(--surface2);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    border-right: 1px solid var(--border);
    color: var(--text-dim);
  }
  .date-cell.label-cell {
    font-size: 10px;
    color: var(--text-muted);
    padding-left: 14px;
    display: flex;
    align-items: center;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .date-cell.nonmonth { color: var(--nonmonth-text); background: var(--nonmonth-bg); }
  .date-cell.today { color: var(--accent); background: var(--today-glow); }
  .date-cell.sat { color: #5B9BD5; }
  .date-cell.sun { color: #E06666; }

  /* 채널 라벨 */
  .ch-label {
    padding: 3px 8px 3px 14px;
    font-size: 10px;
    font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
  }
  .ch-label .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ch-label.week-end { border-bottom: 1px solid var(--border); }

  /* 콘텐츠 셀 */
  .c-cell {
    padding: 3px 6px;
    font-size: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    min-height: 26px;
    display: flex;
    align-items: center;
    background: var(--bg);
  }
  .c-cell:hover { background: var(--surface); }
  .c-cell.week-end { border-bottom: 1px solid var(--border); }
  .c-cell.nonmonth { background: var(--nonmonth-bg); cursor: default; }
  .c-cell.sat { background: var(--sat-bg); }
  .c-cell.sun { background: var(--sun-bg); }
  .c-cell.today-col { box-shadow: inset 0 0 0 1px rgba(15,253,2,0.1); }
  .c-cell .val {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 11px;
  }
  .c-cell .ph {
    color: var(--text-muted);
    font-size: 10px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .c-cell:hover .ph { opacity: 1; }

  /* 이번 주 강조 */
  .this-week > .date-cell.label-cell,
  .this-week > .ch-label {
    border-left: 2px solid var(--accent);
  }
  .this-week > .date-cell:not(.label-cell),
  .this-week > .c-cell {
    background-color: var(--week-highlight);
  }

  /* ══════════ 홍보기록 테이블 ══════════ */
  .records-wrap {
    margin: 0 24px 40px;
    border: 1px solid var(--border);
    border-radius: 0 var(--radius) var(--radius) var(--radius);
    overflow-x: auto;
    display: none;
  }
  .records-wrap table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .records-wrap th {
    background: var(--surface);
    padding: 8px 10px;
    text-align: left;
    font-weight: 600;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .records-wrap td {
    padding: 6px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    white-space: nowrap;
  }

  /* ══════════ 모달 ══════════ */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 14px;
    padding: 24px;
    width: 360px;
    max-width: 92vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal h3 { font-size: 15px; font-weight: 700; }
  .modal .meta { font-size: 12px; color: var(--text-dim); margin: 2px 0 16px; }
  .modal label {
    display: block;
    font-size: 11px;
    color: var(--text-muted);
    margin: 12px 0 4px;
    font-weight: 500;
  }
  .modal input, .modal select {
    width: 100%;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .modal input:focus, .modal select:focus {
    border-color: var(--accent);
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    justify-content: flex-end;
  }
  .m-btn {
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .m-btn:hover { opacity: 0.85; }
  .m-btn.cancel { background: var(--surface2); color: var(--text-dim); }
  .m-btn.save { background: var(--accent); color: #000; }
  .m-btn.del { background: var(--danger); color: #fff; margin-right: auto; }
</style>
</head>
<body>

<!-- ══════════ 로그인 ══════════ -->
<div id="login-screen">
  <div class="login-logo">YEULMARU</div>
  <div class="login-title">홍보 계획표</div>
  <div class="pin-wrap">
    <input class="pin-input" type="password" maxlength="1" inputmode="numeric" autofocus>
    <input class="pin-input" type="password" maxlength="1" inputmode="numeric">
    <input class="pin-input" type="password" maxlength="1" inputmode="numeric">
    <input class="pin-input" type="password" maxlength="1" inputmode="numeric">
  </div>
  <div id="login-error"></div>
  <div id="login-loading"></div>
</div>

<!-- ══════════ 앱 ══════════ -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title"><span>예울마루</span> 홍보 계획표</div>
    <div class="topbar-right">
      <span id="sync-time"></span>
      <button onclick="loadData()">↻ 새로고침</button>
    </div>
  </div>

  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label">
      <span class="year" id="nav-year">2026</span>
      <span class="month" id="nav-month">5</span><span class="suffix">월 홍보 계획</span>
    </div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>

  <div class="status-bar" id="status"></div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('cal')">📅 캘린더</button>
    <button class="tab-btn" onclick="switchTab('rec')">📋 홍보기록</button>
  </div>

  <div id="tab-cal" class="calendar-wrap">
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div id="tab-rec" class="records-wrap">
    <table>
      <thead id="rec-head"></thead>
      <tbody id="rec-body"></tbody>
    </table>
  </div>
</div>

<!-- ══════════ 모달 ══════════ -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="m-title"></h3>
    <div class="meta" id="m-meta"></div>

    <label>콘텐츠 제목</label>
    <input type="text" id="f-title" placeholder="입력">

    <label>콘텐츠 구분</label>
    <select id="f-cat">
      <option value="">선택</option>
      <option>공연</option>
      <option>전시</option>
      <option>교육</option>
      <option>기타</option>
    </select>

    <label>진행 상태</label>
    <select id="f-status">
      <option>예정</option>
      <option>진행중</option>
      <option>완료</option>
      <option>취소</option>
      <option>보류</option>
    </select>

    <label>비고</label>
    <input type="text" id="f-memo" placeholder="">

    <div class="modal-actions">
      <button class="m-btn del" id="btn-del" onclick="delEntry()" style="display:none">삭제</button>
      <button class="m-btn cancel" onclick="closeModal()">취소</button>
      <button class="m-btn save" onclick="saveEntry()">저장</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// CONFIG — Worker URL을 여기에 입력
// ═══════════════════════════════════════
const API = 'https://yeulmaru-promo-api.yeulmarumaster.workers.dev';
// 로컬 테스트: const API = 'http://localhost:8787';

const CHANNELS = [
  { name: '카카오톡',      key: '카카오',  color: 'var(--kakao)' },
  { name: '인스타그램',    key: '인스타',  color: 'var(--insta)' },
  { name: '유튜브/블로그', key: '유튜브',  color: 'var(--youtube)' },
  { name: '기타 채널',     key: '기타',    color: 'var(--navy)' },
];
const DAYS_KR = ['화','수','목','금','토','일'];

let password = '';
let records = [];
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;
let editing = null;

// ═══════════════════════════════════════
// PIN 입력
// ═══════════════════════════════════════
const pins = document.querySelectorAll('.pin-input');
pins.forEach((el, i) => {
  el.addEventListener('input', e => {
    el.classList.remove('error');
    if (el.value.length === 1 && i < 3) pins[i + 1].focus();
    if (i === 3 && el.value.length === 1) tryLogin();
  });
  el.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !el.value && i > 0) pins[i - 1].focus();
  });
  el.addEventListener('paste', e => {
    e.preventDefault();
    const txt = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 4);
    txt.split('').forEach((c, j) => { if (pins[j]) pins[j].value = c; });
    if (txt.length === 4) tryLogin();
  });
});

async function tryLogin() {
  const pin = Array.from(pins).map(p => p.value).join('');
  if (pin.length !== 4) return;

  document.getElementById('login-error').textContent = '';
  document.getElementById('login-loading').textContent = '확인 중...';

  try {
    const r = await fetch(`${API}/api/auth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pin }),
    });
    const data = await r.json();

    if (data.ok) {
      password = pin;
      sessionStorage.setItem('pw', pin);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadData();
    } else {
      document.getElementById('login-loading').textContent = '';
      document.getElementById('login-error').textContent = '비밀번호가 틀립니다';
      pins.forEach(p => { p.value = ''; p.classList.add('error'); });
      pins[0].focus();
    }
  } catch (e) {
    document.getElementById('login-loading').textContent = '';
    document.getElementById('login-error').textContent = '서버 연결 실패 — Worker URL 확인 필요';
    console.error(e);
  }
}

// 세션 복원
(function() {
  const saved = sessionStorage.getItem('pw');
  if (saved) {
    password = saved;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  }
})();

// ═══════════════════════════════════════
// API 호출
// ═══════════════════════════════════════
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'X-App-Password': password,
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${API}${path}`, opts);
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`${r.status}: ${t}`);
  }
  return r.json();
}

// ═══════════════════════════════════════
// 데이터 로드
// ═══════════════════════════════════════
async function loadData() {
  try {
    setStatus('데이터 로딩 중...', 'loading');
    const data = await api('GET', '/api/records');
    records = data.records || [];
    const now = new Date();
    document.getElementById('sync-time').textContent =
      `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} 동기화`;
    setStatus(`${records.length}건 로드`, '');
    renderCalendar();
    renderRecords();
  } catch (e) {
    setStatus('로드 실패: ' + e.message, 'error');
    console.error(e);
  }
}

// ═══════════════════════════════════════
// 캘린더 렌더링
// ═══════════════════════════════════════
function calDates(y, m) {
  const first = new Date(y, m - 1, 1);
  let dow = first.getDay(); // 0=일
  let offset = (dow - 2 + 7) % 7; // 화요일 기준
  const start = new Date(y, m - 1, 1 - offset);
  const dates = [];
  for (let i = 0; i < 36; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function dk(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isToday(d) {
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}

function excelToKey(v) {
  if (!v) return '';
  if (typeof v === 'number') {
    const d = new Date((v - 25569) * 86400000);
    return dk(d);
  }
  return String(v);
}

function findRecs(d, ch) {
  const key = dk(d);
  return records.filter(r => {
    const p = (r['플랫폼 1'] || '');
    return excelToKey(r['날짜']) === key && p.includes(ch.key);
  });
}

function renderCalendar() {
  const g = document.getElementById('cal-grid');
  g.innerHTML = '';
  document.getElementById('nav-year').textContent = currentYear;
  document.getElementById('nav-month').textContent = currentMonth;

  const dates = calDates(currentYear, currentMonth);
  const today = new Date();
  const todayKey = dk(today);

  // 요일 헤더
  g.innerHTML += `<div class="day-header"></div>`;
  DAYS_KR.forEach((d, i) => {
    const c = i===4 ? 'sat' : i===5 ? 'sun' : '';
    g.innerHTML += `<div class="day-header ${c}">${d}</div>`;
  });

  // 6주
  for (let w = 0; w < 6; w++) {
    const wd = dates.slice(w*6, w*6+6);
    const isThisWeek = wd.some(d => dk(d) === todayKey);
    const wCls = isThisWeek ? 'this-week' : '';

    // 날짜 행을 감싸는 wrapper (CSS grid에서 contents 대신 class 전파용)
    // — CSS grid는 display:contents 자식에만 적용되므로 클래스를 각 셀에 직접

    // 날짜 헤더
    g.innerHTML += `<div class="date-cell label-cell ${wCls ? 'this-week' : ''}" style="${isThisWeek?'border-left:2px solid var(--accent)':''}">W${w+1}</div>`;
    wd.forEach((d, di) => {
      const nm = d.getMonth()+1 !== currentMonth;
      const td = isToday(d);
      const dn = ['일','월','화','수','목','금','토'][d.getDay()];
      let cls = nm ? 'nonmonth' : '';
      if (td) cls = 'today';
      if (di===4 && !nm && !td) cls += ' sat';
      if (di===5 && !nm && !td) cls += ' sun';
      if (isThisWeek && !nm) cls += ' this-week-cell';
      g.innerHTML += `<div class="date-cell ${cls}" style="${isThisWeek&&!nm?'background:var(--week-highlight)':''}">${d.getMonth()+1}/${d.getDate()}(${dn})</div>`;
    });

    // 채널 행
    CHANNELS.forEach((ch, ci) => {
      const last = ci === 3;
      const lcls = last ? 'week-end' : '';

      g.innerHTML += `<div class="ch-label ${lcls}" style="${isThisWeek?'border-left:2px solid var(--accent)':''}"><span class="dot" style="background:${ch.color}"></span>${ch.name}</div>`;

      wd.forEach((d, di) => {
        const nm = d.getMonth()+1 !== currentMonth;
        let cls = lcls;
        if (nm) cls += ' nonmonth';
        else {
          if (di===4) cls += ' sat';
          if (di===5) cls += ' sun';
          if (isToday(d)) cls += ' today-col';
          if (isThisWeek) cls += '';
        }

        const recs = nm ? [] : findRecs(d, ch);
        let inner = '';
        if (nm) {
          inner = '';
        } else if (recs.length > 0) {
          const title = recs.map(r => r['콘텐츠 제목']||'').filter(Boolean).join(', ');
          inner = `<span class="val" style="color:${ch.color}">${title}</span>`;
        } else {
          inner = `<span class="ph">+</span>`;
        }

        const click = nm ? '' : `onclick="openModal('${dk(d)}','${ci}')"`;
        g.innerHTML += `<div class="c-cell ${cls}" style="${isThisWeek&&!nm?'background:var(--week-highlight)':''}" ${click}>${inner}</div>`;
      });
    });
  }
}

// ═══════════════════════════════════════
// 홍보기록 테이블
// ═══════════════════════════════════════
function renderRecords() {
  const cols = ['No','날짜','플랫폼 1','콘텐츠 구분','콘텐츠 제목','진행 상태','비고'];
  document.getElementById('rec-head').innerHTML = '<tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr>';
  const filtered = records.filter(r => Number(r['월'])===currentMonth && Number(r['연도'])===currentYear);
  document.getElementById('rec-body').innerHTML = filtered.map(r => '<tr>' + cols.map(c => {
    let v = r[c] ?? '';
    if (c==='날짜' && typeof v==='number') { const d=new Date((v-25569)*86400000); v=`${d.getMonth()+1}/${d.getDate()}`; }
    return `<td>${v}</td>`;
  }).join('') + '</tr>').join('') || `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">이번 달 기록 없음</td></tr>`;
}

// ═══════════════════════════════════════
// 모달
// ═══════════════════════════════════════
function openModal(dateKey, chIdx) {
  const ch = CHANNELS[chIdx];
  const [y,m,d] = dateKey.split('-').map(Number);
  const dateObj = new Date(y, m-1, d);
  const dn = ['일','월','화','수','목','금','토'][dateObj.getDay()];

  const recs = findRecs(dateObj, ch);

  document.getElementById('m-title').innerHTML = `<span style="color:${ch.color}">●</span> ${ch.name}`;
  document.getElementById('m-meta').textContent = `${m}월 ${d}일 (${dn})`;

  editing = { dateKey, ch, existing: recs[0] || null };

  if (recs[0]) {
    document.getElementById('f-title').value = recs[0]['콘텐츠 제목'] || '';
    document.getElementById('f-cat').value = recs[0]['콘텐츠 구분'] || '';
    document.getElementById('f-status').value = recs[0]['진행 상태'] || '예정';
    document.getElementById('f-memo').value = recs[0]['비고'] || '';
    document.getElementById('btn-del').style.display = '';
  } else {
    document.getElementById('f-title').value = '';
    document.getElementById('f-cat').value = '';
    document.getElementById('f-status').value = '예정';
    document.getElementById('f-memo').value = '';
    document.getElementById('btn-del').style.display = 'none';
  }

  document.getElementById('modal').classList.add('show');
  setTimeout(() => document.getElementById('f-title').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  editing = null;
}

function chToPlatform(ch) {
  if (ch.key === '카카오') return '카카오톡';
  if (ch.key === '인스타') return '인스타그램';
  if (ch.key === '유튜브') return '유튜브/블로그';
  if (ch.key === '기타') return '기타채널';
  return ch.name;
}

async function saveEntry() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) return alert('콘텐츠 제목을 입력하세요');

  const cat = document.getElementById('f-cat').value;
  const st = document.getElementById('f-status').value;
  const memo = document.getElementById('f-memo').value;

  const [y,m,d] = editing.dateKey.split('-').map(Number);
  const dateObj = new Date(y, m-1, d);
  const dn = ['일','월','화','수','목','금','토'][dateObj.getDay()];
  const serial = Math.floor((dateObj.getTime()/86400000)+25569);

  const now = new Date();
  const kst = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const nextNo = records.length + 1;
  const row = [
    editing.existing ? (editing.existing['No'] || nextNo) : nextNo,
    editing.existing ? (editing.existing['입력시간(KST)'] || kst) : kst,
    serial, y, m, d, dn,
    chToPlatform(editing.ch), '', cat, '', title, '', '', st, memo,
  ];

  try {
    setStatus('저장 중...', 'loading');
    if (editing.existing) {
      await api('PATCH', `/api/records/${editing.existing._rowIndex}`, { values: row });
    } else {
      await api('POST', '/api/records', { values: row });
    }
    closeModal();
    await loadData();
  } catch(e) {
    setStatus('저장 실패: ' + e.message, 'error');
  }
}

async function delEntry() {
  if (!editing?.existing) return;
  if (!confirm('삭제하시겠습니까?')) return;
  try {
    setStatus('삭제 중...', 'loading');
    await api('DELETE', `/api/records/${editing.existing._rowIndex}`);
    closeModal();
    await loadData();
  } catch(e) {
    setStatus('삭제 실패: ' + e.message, 'error');
  }
}

// ═══════════════════════════════════════
// UI 유틸
// ═══════════════════════════════════════
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  renderCalendar();
  renderRecords();
}

function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (t==='cal'&&i===0)||(t==='rec'&&i===1));
  });
  document.getElementById('tab-cal').style.display = t==='cal' ? '' : 'none';
  document.getElementById('tab-rec').style.display = t==='rec' ? '' : 'none';
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-bar ' + (type||'');
  if (!type) setTimeout(() => { if(el.textContent===msg) el.textContent=''; }, 3000);
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
document.getElementById('modal').addEventListener('click', e => { if(e.target.id==='modal') closeModal(); });
</script>
