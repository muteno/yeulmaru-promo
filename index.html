<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홍보 계획표 — 예울마루</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',-apple-system,sans-serif}
:root{
  --bg:#F5F3EF;--surface:#fff;--border:#EDEDED;--border2:#E8E5E0;
  --text:#333;--dim:#999;--muted:#bbb;--past-bg:#F5F4F1;--past-text:#aaa;
  --nm-bg:#EEEDEA;--today-bg:#EDF7EE;--accent:#1A6B3C;
  --kakao:#C8900A;--insta:#C02872;--youtube:#B71C1C;--blog:#1B7A34;--etc:#2D5F8A;
}
body{background:var(--bg);color:var(--text);min-height:100vh}
button{font-family:inherit;cursor:pointer}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.cell:hover{filter:brightness(0.97)}

/* ═══ LOGIN ═══ */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:28px}
.login-logo{font-size:14px;font-weight:800;color:#1A6B3C;letter-spacing:4px}
.login-title{font-size:26px;font-weight:300;color:var(--text)}
.pin-wrap{display:flex;gap:12px}
.pin{width:52px;height:60px;text-align:center;font-size:24px;font-weight:700;background:var(--surface);border:2px solid var(--border2);border-radius:12px;color:var(--text);caret-color:var(--accent);outline:none;transition:border-color .15s}
.pin:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,107,60,0.15)}
.pin.err{border-color:#D64545}
#login-msg{font-size:13px;height:20px;color:#D64545}
#login-load{font-size:13px;height:20px;color:var(--accent)}

/* ═══ NAV ═══ */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;background:var(--surface);border-bottom:1px solid var(--border2)}
.nav-left{display:flex;align-items:center;gap:10px}
.nav-logo{font-size:14px;font-weight:800;color:#1A6B3C;letter-spacing:2px}
.nav-sub{font-size:13px;color:var(--dim)}
.nav-center{display:flex;gap:4px;position:relative}
.nav-pill{position:absolute;height:34px;background:#1A1A1A;border-radius:20px;transition:all .3s cubic-bezier(.4,0,.2,1);z-index:0;pointer-events:none}
.nav-btn{padding:8px 18px;border:none;border-radius:20px;font-size:13px;font-weight:500;background:transparent;color:#777;transition:color .2s;position:relative;z-index:1}
.nav-btn.on{color:#fff}
.nav-right{display:flex;align-items:center;gap:12px}
.kst{font-size:12px;color:var(--dim);font-weight:500;font-variant-numeric:tabular-nums}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid #E0E0E0;background:var(--surface);font-size:16px;color:#666;display:flex;align-items:center;justify-content:center}

/* ═══ HEADER ═══ */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.month-nav{display:flex;align-items:center;gap:16px}
.arrow{width:36px;height:36px;border-radius:50%;border:1px solid #DDD;background:var(--surface);font-size:18px;display:flex;align-items:center;justify-content:center;color:#666}
.month-text{font-size:30px;font-weight:700;color:#1A6B3C}
.year-text{font-size:16px;color:var(--dim);margin-left:6px}
.chips{display:flex;gap:10px;flex-wrap:wrap}
.chip{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface);border-radius:20px;font-size:12px;border:1px solid var(--border)}
.chip-dot{width:8px;height:8px;border-radius:50%}
.chip-label{color:#666;font-weight:500}
.chip-count{font-weight:700}

/* ═══ CALENDAR ═══ */
.cal{background:var(--surface);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid var(--border)}
.cal-head{display:grid;grid-template-columns:repeat(6,1fr);border-bottom:1px solid var(--border)}
.dh{padding:14px 8px;text-align:center;font-size:14px;font-weight:700;background:#FAFAF8;color:#666}
.dh.sat{color:#3B7DD8}
.dh.sun{color:#D64545}
.week{display:grid;grid-template-columns:repeat(6,1fr);border-bottom:1px solid var(--border);position:relative}
.week:last-child{border-bottom:none}
.week.tw{box-shadow:inset 0 0 0 2px #555;border-radius:4px;z-index:2}
.c{min-height:110px;padding:7px 8px;border-right:1px solid var(--border);position:relative;overflow:hidden;transition:filter .1s}
.c:last-child{border-right:none}
.c.nm{background:var(--nm-bg);cursor:default}
.c.past{background:var(--past-bg)}
.c.today{background:var(--today-bg)}
.c.sel{box-shadow:inset 0 0 0 2px var(--accent)}
.dn{font-size:13px;font-weight:600;margin-bottom:5px}
.dn.nm{color:var(--muted)}
.dn.past{color:var(--past-text)}
.dn.sat{color:#3B7DD8}
.dn.sun{color:#D64545}
.today-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;font-weight:700}
.ev{display:flex;align-items:center;gap:4px;padding:2px 0;font-size:10.5px;line-height:1.4}
.ev-time{font-weight:700;flex-shrink:0}
.ev-plat{font-weight:600;flex-shrink:0}
.ev-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ev-title.future{color:#222;font-weight:600}
.ev-title.past{color:var(--past-text)}
.diag{position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.025) 4px,rgba(0,0,0,.025) 5px);pointer-events:none}

/* ═══ PANEL ═══ */
.panel{position:fixed;top:56px;right:0;width:350px;height:calc(100vh - 56px);background:var(--surface);border-left:1px solid var(--border2);box-shadow:-4px 0 20px rgba(0,0,0,.06);z-index:10;display:flex;flex-direction:column;animation:slideIn .2s ease}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border)}
.panel-date{font-size:20px;font-weight:700}
.panel-day{font-size:13px;color:var(--dim);margin-top:2px}
.panel-close{width:32px;height:32px;border-radius:50%;border:1px solid #E0E0E0;background:var(--surface);font-size:14px;color:var(--dim);display:flex;align-items:center;justify-content:center}
.panel-body{flex:1;padding:16px 24px;overflow-y:auto}
.panel-empty{text-align:center;padding:40px 0;color:var(--dim);font-size:14px}
.p-card{padding:16px;background:#FAFAF8;border-radius:12px;margin-bottom:12px;border:1px solid var(--border)}
.p-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.p-tag{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:transparent}
.p-time{font-size:12px;color:var(--dim);font-weight:500}
.p-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px}
.p-meta{display:flex;gap:6px}
.meta-chip{font-size:11px;padding:2px 8px;border-radius:8px;background:#EDEDED;color:#777;font-weight:500}
.add-btn{width:100%;padding:12px;border:2px dashed #DDD;border-radius:12px;background:transparent;color:var(--dim);font-size:13px;font-weight:600;margin-top:8px}

/* ═══ 입력 모달 ═══ */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:24px;width:380px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:700}
.modal .meta{font-size:12px;color:var(--dim);margin:2px 0 16px}
.modal label{display:block;font-size:11px;color:#888;margin:12px 0 4px;font-weight:500}
.modal input,.modal select{width:100%;padding:9px 12px;background:#FAFAF8;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
.modal input:focus,.modal select:focus{border-color:var(--accent)}
.modal-acts{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.m-btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;border:none;transition:opacity .15s}
.m-btn:hover{opacity:.85}
.m-btn.cancel{background:#EDEDED;color:#777}
.m-btn.save{background:var(--accent);color:#fff}
.m-btn.del{background:#D64545;color:#fff;margin-right:auto}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login">
  <div class="login-logo">YEULMARU</div>
  <div class="login-title">홍보 계획표</div>
  <div class="pin-wrap">
    <input class="pin" type="password" maxlength="1" inputmode="numeric" autofocus>
    <input class="pin" type="password" maxlength="1" inputmode="numeric">
    <input class="pin" type="password" maxlength="1" inputmode="numeric">
    <input class="pin" type="password" maxlength="1" inputmode="numeric">
  </div>
  <div id="login-msg"></div>
  <div id="login-load"></div>
</div>

<!-- ═══ APP ═══ -->
<div id="app" style="display:none">
  <nav class="nav">
    <div class="nav-left">
      <span class="nav-logo">YEULMARU</span>
      <span class="nav-sub">홍보 계획표</span>
    </div>
    <div class="nav-center" id="nav-menus"></div>
    <div class="nav-right">
      <span class="kst" id="kst"></span>
      <button class="icon-btn" onclick="loadData()">↻</button>
    </div>
  </nav>

  <div id="body-wrap" style="display:flex;position:relative;min-height:calc(100vh - 56px)"
    onclick="if(!event.target.closest('[data-panel]')&&!event.target.closest('[data-cell]'))closePanel()">

    <div id="main-area" style="flex:1;padding:24px 32px;transition:margin-right .3s">
      <div class="hdr">
        <div class="month-nav">
          <button class="arrow" onclick="changeMonth(-1)">‹</button>
          <div><span class="month-text" id="nav-month">5</span><span class="year-text" id="nav-year">2026</span></div>
          <button class="arrow" onclick="changeMonth(1)">›</button>
        </div>
        <div class="chips" id="chips"></div>
      </div>
      <div class="cal" id="cal"></div>
    </div>

    <div id="panel" class="panel" style="display:none" data-panel></div>
  </div>
</div>

<!-- ═══ MODAL ═══ -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="m-title"></h3>
    <div class="meta" id="m-meta"></div>
    <label>시간</label>
    <input type="time" id="f-time" value="10:00">
    <label>플랫폼</label>
    <select id="f-plat">
      <option value="카카오톡">카카오톡</option>
      <option value="인스타그램">인스타그램</option>
      <option value="유튜브">유튜브</option>
      <option value="블로그">블로그</option>
      <option value="기타채널">기타채널</option>
    </select>
    <label>콘텐츠 제목</label>
    <input type="text" id="f-title" placeholder="입력">
    <label>콘텐츠 구분</label>
    <select id="f-cat"><option value="">선택</option><option>공연</option><option>전시</option><option>교육</option><option>기타</option></select>
    <label>진행 상태</label>
    <select id="f-status"><option>예정</option><option>진행중</option><option>완료</option><option>취소</option><option>보류</option></select>
    <label>비고</label>
    <input type="text" id="f-memo">
    <div class="modal-acts">
      <button class="m-btn del" id="btn-del" onclick="delEntry()" style="display:none">삭제</button>
      <button class="m-btn cancel" onclick="closeModal()">취소</button>
      <button class="m-btn save" onclick="saveEntry()">저장</button>
    </div>
  </div>
</div>

<script>
// ═══ CONFIG ═══
const API = 'https://yeulmaru-promo-api.yeulmarumaster.workers.dev';
const PLAT_COLORS = {
  '\uCE74\uCE74\uC624': '#C8900A',     // 카카오
  '\uCE74\uCE74\uC624\uD1A1': '#C8900A',
  '\uC778\uC2A4\uD0C0': '#C02872',     // 인스타
  '\uC778\uC2A4\uD0C0\uADF8\uB7A8': '#C02872',
  '\uC720\uD29C\uBE0C': '#B71C1C',     // 유튜브
  '\uBE14\uB85C\uADF8': '#1B7A34',     // 블로그
  '\uAE30\uD0C0': '#2D5F8A',           // 기타
  '\uAE30\uD0C0\uCC44\uB110': '#2D5F8A',
};
function platColor(p) {
  if (!p) return '#2D5F8A';
  for (const [k,v] of Object.entries(PLAT_COLORS)) { if (p.includes(k)) return v; }
  return '#2D5F8A';
}
function platShort(p) {
  if (!p) return '';
  if (p.includes('\uCE74\uCE74\uC624')) return '\uCE74\uCE74\uC624';
  if (p.includes('\uC778\uC2A4\uD0C0')) return '\uC778\uC2A4\uD0C0';
  if (p.includes('\uC720\uD29C\uBE0C') || p.includes('\uBE14\uB85C\uADF8')) return '\uC720\uD29C\uBE0C/\uBE14\uB85C\uADF8';
  if (p.includes('\uAE30\uD0C0')) return '\uAE30\uD0C0';
  return p;
}

const DAYS = ['\uD654','\uC218','\uBAA9','\uAE08','\uD1A0','\uC77C'];
const DAY_NAMES = ['\uC77C','\uC6D4','\uD654','\uC218','\uBAA9','\uAE08','\uD1A0'];
const MENUS = [
  {label:'\uCE98\uB9B0\uB354',id:'cal'},
  {label:'\uD50C\uB7AB\uD3FC \uD604\uD669',id:'platform'},
  {label:'\uD64D\uBCF4 \uD574\uC918\uD83D\uDE1B',id:'promo'},
  {label:'\uC5F0\uAC04 \uC77C\uC815',id:'annual'},
  {label:'\uC124\uC815',id:'settings'},
];

let password='', records=[], currentYear=new Date().getFullYear(), currentMonth=new Date().getMonth()+1;
let selected=null, editing=null, panelOpen=false;

// ═══ PIN ═══
const pins = document.querySelectorAll('.pin');
pins.forEach((el,i) => {
  el.addEventListener('input', () => {
    el.classList.remove('err');
    if (el.value.length===1 && i<3) pins[i+1].focus();
    if (i===3 && el.value.length===1) tryLogin();
  });
  el.addEventListener('keydown', e => {
    if (e.key==='Backspace' && !el.value && i>0) pins[i-1].focus();
  });
  el.addEventListener('paste', e => {
    e.preventDefault();
    const t = (e.clipboardData.getData('text')||'').replace(/\D/g,'').slice(0,4);
    t.split('').forEach((c,j) => { if(pins[j]) pins[j].value=c; });
    if (t.length===4) tryLogin();
  });
});

async function tryLogin() {
  const pin = Array.from(pins).map(p=>p.value).join('');
  if (pin.length!==4) return;
  document.getElementById('login-msg').textContent='';
  document.getElementById('login-load').textContent='\uD655\uC778 \uC911...';
  try {
    const r = await fetch(`${API}/api/auth`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pin})});
    const d = await r.json();
    if (d.ok) {
      password=pin; sessionStorage.setItem('pw',pin);
      document.getElementById('login').style.display='none';
      document.getElementById('app').style.display='';
      initApp();
    } else {
      document.getElementById('login-load').textContent='';
      document.getElementById('login-msg').textContent='\uBE44\uBC00\uBC88\uD638\uAC00 \uD2C0\uB9BD\uB2C8\uB2E4';
      pins.forEach(p=>{p.value='';p.classList.add('err')});
      pins[0].focus();
    }
  } catch(e) {
    document.getElementById('login-load').textContent='';
    document.getElementById('login-msg').textContent='\uC11C\uBC84 \uC5F0\uACB0 \uC2E4\uD328';
  }
}
(function(){
  const s=sessionStorage.getItem('pw');
  if(s){password=s;document.getElementById('login').style.display='none';document.getElementById('app').style.display='';initApp();}
})();

// ═══ API ═══
async function api(method,path,body){
  const o={method,headers:{'Content-Type':'application/json','X-App-Password':password}};
  if(body)o.body=JSON.stringify(body);
  const r=await fetch(`${API}${path}`,o);
  if(!r.ok)throw new Error(`${r.status}: ${await r.text()}`);
  return r.json();
}

// ═══ INIT ═══
function initApp(){
  buildNav();
  startClock();
  loadData();
}

function buildNav(){
  const c=document.getElementById('nav-menus');
  c.innerHTML='';
  const pill=document.createElement('div');
  pill.className='nav-pill';
  c.appendChild(pill);
  MENUS.forEach((m,i)=>{
    const b=document.createElement('button');
    b.className='nav-btn'+(m.id==='cal'?' on':'');
    b.textContent=m.label;
    b.onclick=()=>{
      if(m.id==='annual'){window.open('https://yeulmaru.github.io/yeulmaru-calandar-2026/','_blank');return;}
      document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      movePill(b,pill);
    };
    b.onmouseenter=()=>movePill(b,pill);
    c.appendChild(b);
  });
  c.onmouseleave=()=>{const active=c.querySelector('.nav-btn.on');if(active)movePill(active,pill);};
  requestAnimationFrame(()=>{const active=c.querySelector('.nav-btn.on');if(active)movePill(active,pill);});
}
function movePill(btn,pill){
  const r=btn.getBoundingClientRect();
  const p=btn.parentElement.getBoundingClientRect();
  pill.style.left=(r.left-p.left)+'px';
  pill.style.width=r.width+'px';
  pill.style.top=((r.height-34)/2)+'px';
}

function startClock(){
  function tick(){
    const n=new Date();
    document.getElementById('kst').textContent=
      `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')} KST`;
  }
  tick(); setInterval(tick,1000);
}

// ═══ DATA ═══
async function loadData(){
  try{
    const d=await api('GET','/api/records');
    records=d.records||[];
    render();
  }catch(e){console.error(e);}
}

function excelToKey(v){
  if(!v)return'';
  if(typeof v==='number'){const d=new Date((v-25569)*86400000);return dk(d);}
  return String(v);
}
function dk(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isToday(d){return dk(d)===dk(new Date());}
function isPast(d){const t=new Date();t.setHours(0,0,0,0);const dd=new Date(d);dd.setHours(0,0,0,0);return dd<t;}

function getRecsForDate(d){
  const key=dk(d);
  return records.filter(r=>excelToKey(r['\uB0A0\uC9DC'])===key);
}

function calDates(y,m){
  const first=new Date(y,m-1,1);
  const dow=first.getDay();
  const offset=(dow-2+7)%7;
  const start=new Date(y,m-1,1-offset);
  const out=[];
  for(let i=0;i<36;i++){const d=new Date(start);d.setDate(d.getDate()+i);out.push(d);}
  return out;
}

// ═══ RENDER ═══
function render(){
  document.getElementById('nav-month').textContent=currentMonth;
  document.getElementById('nav-year').textContent=currentYear;
  renderChips();
  renderCal();
}

function renderChips(){
  const c=document.getElementById('chips');
  const groups=[
    {label:'\uCE74\uCE74\uC624',color:'#C8900A',match:['\uCE74\uCE74\uC624']},
    {label:'\uC778\uC2A4\uD0C0',color:'#C02872',match:['\uC778\uC2A4\uD0C0']},
    {label:'\uBE14\uB85C\uADF8\xB7\uB9D8\uCE74\uD398',color:'#1B7A34',match:['\uBE14\uB85C\uADF8','\uB9D8\uCE74\uD398']},
    {label:'B2B',color:'#2D5F8A',match:['B2B']},
  ];
  c.innerHTML=groups.map(g=>{
    const cnt=records.filter(r=>{const p=r['\uD50C\uB7AB\uD3FC 1']||'';return g.match.some(m=>p.includes(m));}).length;
    return `<div class="chip"><span class="chip-dot" style="background:${g.color}"></span><span class="chip-label">${g.label}</span><span class="chip-count">${cnt}</span></div>`;
  }).join('');
}

function renderCal(){
  const cal=document.getElementById('cal');
  const dates=calDates(currentYear,currentMonth);
  const weeks=[];
  for(let i=0;i<dates.length;i+=6)weeks.push(dates.slice(i,i+6));
  const todayKey=dk(new Date());
  const twIdx=weeks.findIndex(w=>w.some(d=>dk(d)===todayKey));

  let h='<div class="cal-head">';
  DAYS.forEach((d,i)=>{
    const cls=i===4?'dh sat':i===5?'dh sun':'dh';
    h+=`<div class="${cls}" style="${i<5?'border-right:1px solid var(--border)':''}">${d}</div>`;
  });
  h+='</div>';

  weeks.forEach((week,wi)=>{
    const isTW=wi===twIdx;
    h+=`<div class="week${isTW?' tw':''}" style="${wi<weeks.length-1?'':'border-bottom:none'}">`;
    week.forEach((d,di)=>{
      const key=dk(d);
      const nm=d.getMonth()+1!==currentMonth;
      const td=isToday(d);
      const past=isPast(d)&&!td;
      const isSat=di===4,isSun=di===5;
      const isSel=selected===key;
      const recs=nm?[]:getRecsForDate(d);

      let bg='#fff';
      if(nm)bg='var(--nm-bg)';
      else if(td)bg='var(--today-bg)';
      else if(past)bg='var(--past-bg)';

      let dnCls='dn';
      if(nm)dnCls+=' nm';else if(past)dnCls+=' past';else if(isSat)dnCls+=' sat';else if(isSun)dnCls+=' sun';

      h+=`<div class="c cell${nm?' nm':''}${past?' past':''}${td?' today':''}${isSel?' sel':''}" data-cell data-key="${key}" onclick="clickDate('${key}')" style="background:${bg};${di<5?'border-right:1px solid var(--border)':''}${nm?'cursor:default':'cursor:pointer'}">`;
      h+=`<div class="${dnCls}">`;
      if(td&&!nm) h+=`<span class="today-badge">${d.getDate()}</span>`;
      else h+=d.getDate();
      h+='</div>';

      recs.slice(0,3).forEach(r=>{
        const p=r['\uD50C\uB7AB\uD3FC 1']||'';
        const col=platColor(p);
        const title=r['\uCF58\uD150\uCE20 \uC81C\uBAA9']||'';
        const pastCls=past?'past':'future';
        const timeCol=past?'var(--past-text)':col;
        h+=`<div class="ev"><span class="ev-time" style="color:${timeCol}">${''}</span><span class="ev-plat" style="color:${timeCol}">${platShort(p)}</span><span class="ev-title ${pastCls}">${title}</span></div>`;
      });
      if(recs.length>3)h+=`<div style="font-size:10px;color:var(--dim);padding-top:2px">+${recs.length-3}\uAC1C</div>`;
      if(nm)h+='<div class="diag"></div>';
      h+='</div>';
    });
    h+='</div>';
  });

  cal.innerHTML=h;
}

// ═══ INTERACTIONS ═══
function clickDate(key){
  const [y,m,d]=key.split('-').map(Number);
  const dateObj=new Date(y,m-1,d);
  if(dateObj.getMonth()+1!==currentMonth)return;
  selected=key;
  const recs=getRecsForDate(dateObj);
  openPanel(dateObj,recs);
  render();
}

function openPanel(dateObj,recs){
  panelOpen=true;
  const p=document.getElementById('panel');
  const dn=DAY_NAMES[dateObj.getDay()];
  document.getElementById('main-area').style.marginRight='360px';
  let h=`<div class="panel-hdr"><div><div class="panel-date">${dateObj.getMonth()+1}\uC6D4 ${dateObj.getDate()}\uC77C</div><div class="panel-day">${dn}\uC694\uC77C</div></div><button class="panel-close" onclick="closePanel()">\u2715</button></div>`;
  h+='<div class="panel-body">';
  if(recs.length===0){
    h+=`<div class="panel-empty"><div style="font-size:32px;margin-bottom:8px">\uD83D\uDCED</div><div>\uB4F1\uB85D\uB41C \uCF58\uD150\uCE20\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4</div></div>`;
  } else {
    recs.forEach(r=>{
      const p2=r['\uD50C\uB7AB\uD3FC 1']||'';
      const col=platColor(p2);
      const title=r['\uCF58\uD150\uCE20 \uC81C\uBAA9']||'';
      const cat=r['\uCF58\uD150\uCE20 \uAD6C\uBD84']||'';
      const st=r['\uC9C4\uD589 \uC0C1\uD0DC']||'';
      h+=`<div class="p-card"><div class="p-card-head"><span class="p-tag" style="color:${col};border:1.5px solid ${col}">${platShort(p2)}</span></div><div class="p-title">${title}</div><div class="p-meta">${cat?`<span class="meta-chip">${cat}</span>`:''}${st?`<span class="meta-chip">${st}</span>`:''}</div></div>`;
    });
  }
  h+=`<button class="add-btn" onclick="openModal('${dk(dateObj)}')">+ \uC0C8 \uCF58\uD150\uCE20 \uB4F1\uB85D</button>`;
  h+='</div>';
  p.innerHTML=h;
  p.style.display='flex';
}

function closePanel(){
  panelOpen=false;
  selected=null;
  document.getElementById('panel').style.display='none';
  document.getElementById('main-area').style.marginRight='0';
  render();
}

function changeMonth(delta){
  currentMonth+=delta;
  if(currentMonth<1){currentMonth=12;currentYear--;}
  if(currentMonth>12){currentMonth=1;currentYear++;}
  closePanel();
  render();
}

// ═══ MODAL ═══
function openModal(dateKey){
  const [y,m,d]=dateKey.split('-').map(Number);
  const dateObj=new Date(y,m-1,d);
  const dn=DAY_NAMES[dateObj.getDay()];
  editing={dateKey,existing:null};
  document.getElementById('m-title').textContent='\uC0C8 \uCF58\uD150\uCE20 \uB4F1\uB85D';
  document.getElementById('m-meta').textContent=`${m}\uC6D4 ${d}\uC77C (${dn}\uC694\uC77C)`;
  document.getElementById('f-time').value='10:00';
  document.getElementById('f-plat').value='\uCE74\uCE74\uC624\uD1A1';
  document.getElementById('f-title').value='';
  document.getElementById('f-cat').value='';
  document.getElementById('f-status').value='\uC608\uC815';
  document.getElementById('f-memo').value='';
  document.getElementById('btn-del').style.display='none';
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>document.getElementById('f-title').focus(),100);
}

function closeModal(){document.getElementById('modal').classList.remove('show');editing=null;}

async function saveEntry(){
  const title=document.getElementById('f-title').value.trim();
  if(!title)return alert('\uCF58\uD150\uCE20 \uC81C\uBAA9\uC744 \uC785\uB825\uD558\uC138\uC694');
  const [y,m,d]=editing.dateKey.split('-').map(Number);
  const dateObj=new Date(y,m-1,d);
  const dn=DAY_NAMES[dateObj.getDay()];
  const serial=Math.floor((dateObj.getTime()/86400000)+25569);
  const now=new Date();
  const kstStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const row=[
    records.length+1,kstStr,serial,y,m,d,dn+'\uC694\uC77C',
    document.getElementById('f-plat').value,'',
    document.getElementById('f-cat').value,'',title,'','',
    document.getElementById('f-status').value,
    document.getElementById('f-memo').value,
  ];
  try{
    await api('POST','/api/records',{values:row});
    closeModal();
    await loadData();
    clickDate(editing.dateKey);
  }catch(e){alert('\uC800\uC7A5 \uC2E4\uD328: '+e.message);}
}

async function delEntry(){
  if(!editing?.existing)return;
  if(!confirm('\uC0AD\uC81C\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C?'))return;
  try{
    await api('DELETE',`/api/records/${editing.existing._rowIndex}`);
    closeModal();await loadData();
  }catch(e){alert('\uC0AD\uC81C \uC2E4\uD328: '+e.message);}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closePanel();}});
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
</script>
